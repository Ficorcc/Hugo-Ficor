<div class="site-footer">
  <div class="header-line"></div>
  <div class="footer-content">
    <div class="footer-left">
      <span>&copy; {{ now.Year }} <a href="/">{{ .Site.Title }}</a></span>
      <span class="footer-divider">|</span>
      <span>Theme by <a href="https://github.com/joway/hugo-theme-yinyang" target="_blank">yinyang</a></span>
      <span class="footer-divider">|</span>
      <span>Powered by <a href="https://gohugo.io/" target="_blank">Hugo</a></span>
    </div>
    <div class="footer-right">
      {{ range .Site.Params.socials }}
      <a href="{{ .link }}" target="_blank" class="social-icon" title="{{ .name }}">{{ .name }}</a>
      {{ end }}
    </div>
  </div>
</div>
